<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aesthetic Online Flip Clock Replica</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="clock-container">
    <!-- Hours Group -->
    <div class="flip-group">
      <div class="flip-card" id="hours-tensor">
        <div class="top">0</div>
        <div class="bottom">0</div>
      </div>
      <div class="flip-card" id="hours-unit">
        <div class="top">0</div>
        <div class="bottom">0</div>
      </div>
    </div>

    <div class="colon">:</div>

    <!-- Minutes Group -->
    <div class="flip-group">
      <div class="flip-card" id="minutes-tensor">
        <div class="top">0</div>
        <div class="bottom">0</div>
      </div>
      <div class="flip-card" id="minutes-unit">
        <div class="top">0</div>
        <div class="bottom">0</div>
      </div>
    </div>

    <div class="colon">:</div>

    <!-- Seconds Group -->
    <div class="flip-group">
      <div class="flip-card" id="seconds-tensor">
        <div class="top">0</div>
        <div class="bottom">0</div>
      </div>
      <div class="flip-card" id="seconds-unit">
        <div class="top">0</div>
        <div class="bottom">0</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
