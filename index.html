<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Live Flip Clock | Aesthetic Digital Clock</title>

    <meta name="description"
        content="A modern responsive live flip clock featuring smooth animations, multiple color themes, and 12/24-hour format support.">

    <meta name="keywords"
        content="Flip Clock, Digital Clock, Live Clock, Clock UI, HTML CSS JavaScript">

    <meta name="author" content="Arisudan">

    <!-- Browser Theme -->
    <meta name="theme-color" content="#121212">

    <!-- Open Graph -->
    <meta property="og:title" content="Live Flip Clock">
    <meta property="og:description"
        content="Responsive Flip Clock with beautiful animations and themes.">
    <meta property="og:type" content="website">

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="theme-dark">

    <!-- ==========================================================
                            CONTROL PANEL
    =========================================================== -->

    <header class="controls-panel">

        <!-- Time Format -->

        <div class="toggle-container">

            <span class="toggle-label">
                12-Hour Format
            </span>

            <label class="switch">

                <input type="checkbox"
                    id="format-toggle"
                    aria-label="Toggle 12 hour clock">

                <span class="slider"></span>

            </label>

        </div>

        <!-- Theme Picker -->

        <div class="theme-picker"
            aria-label="Theme Selector">

            <button
                type="button"
                class="theme-btn btn-dark active"
                data-theme="theme-dark"
                aria-label="Dark Theme"
                title="Classic Dark">
            </button>

            <button
                type="button"
                class="theme-btn btn-light"
                data-theme="theme-light"
                aria-label="Light Theme"
                title="Minimal Light">
            </button>

            <button
                type="button"
                class="theme-btn btn-sage"
                data-theme="theme-sage"
                aria-label="Sage Theme"
                title="Aesthetic Sage">
            </button>

            <button
                type="button"
                class="theme-btn btn-sakura"
                data-theme="theme-sakura"
                aria-label="Sakura Theme"
                title="Sakura Pink">
            </button>

        </div>

    </header>

    <!-- ==========================================================
                                CLOCK
    =========================================================== -->

    <main class="clock-wrapper">

        <section
            class="clock-container"
            role="timer"
            aria-live="polite">

            <!-- HOURS -->

            <div class="flip-group">

                <div class="flip-card" id="hours-tensor">

                    <div class="top">0</div>

                    <div class="bottom">0</div>

                </div>

                <div class="flip-card" id="hours-unit">

                    <div class="top">0</div>

                    <div class="bottom">0</div>

                </div>

            </div>

            <!-- COLON -->

            <div class="colon" aria-hidden="true">:</div>

            <!-- MINUTES -->

            <div class="flip-group">

                <div class="flip-card" id="minutes-tensor">

                    <div class="top">0</div>

                    <div class="bottom">0</div>

                </div>

                <div class="flip-card" id="minutes-unit">

                    <div class="top">0</div>

                    <div class="bottom">0</div>

                </div>

            </div>

            <!-- COLON -->

            <div class="colon" aria-hidden="true">:</div>

            <!-- SECONDS -->

            <div class="flip-group">

                <div class="flip-card" id="seconds-tensor">

                    <div class="top">0</div>

                    <div class="bottom">0</div>

                </div>

                <div class="flip-card" id="seconds-unit">

                    <div class="top">0</div>

                    <div class="bottom">0</div>

                </div>

            </div>

            <!-- AM PM -->

            <div
                class="ampm-card"
                id="ampm-indicator"
                aria-live="polite">

                AM

            </div>

        </section>

    </main>

    <!-- ==========================================================
                        JAVASCRIPT
    =========================================================== -->

    <script src="script.js" defer></script>

</body>

</html>
