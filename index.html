<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aesthetic Online Flip Clock Replica</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">

  <!-- Flocus Inspired Controls Panel -->
  <div class="controls-panel">
    <!-- Format Toggle Switch -->
    <div class="toggle-container">
      <span class="toggle-label">12-Hour Format</span>
      <label class="switch">
        <input type="checkbox" id="format-toggle">
        <span class="slider"></span>
      </label>
    </div>

    <!-- Interactive Color Layout Theme Switcher -->
    <div class="theme-picker">
      <button class="theme-btn btn-dark active" onclick="setTheme('theme-dark')" title="Classic Dark"></button>
      <button class="theme-btn btn-light" onclick="setTheme('theme-light')" title="Minimal Light"></button>
      <button class="theme-btn btn-sage" onclick="setTheme('theme-sage')" title="Aesthetic Sage"></button>
      <button class="theme-btn btn-sakura" onclick="setTheme('theme-sakura')" title="Sakura Pink"></button>
    </div>
  </div>

  <!-- Master Clock Container -->
  <div class="clock-container">
    <!-- Hours Group -->
    <div class="flip-group">
      <div class="flip-card" id="hours-tensor">
        <div class="top">0</div>
        <div class="bottom">0</div>
      </div>
      <div class="flip-card" id="hours-unit">
        <div class="top">0</div>
        <div class="bottom">0</div>
      </div>
    </div>

    <div class="colon">:</div>

    <!-- Minutes Group -->
    <div class="flip-group">
      <div class="flip-card" id="minutes-tensor">
        <div class="top">0</div>
        <div class="bottom">0</div>
      </div>
      <div class="flip-card" id="minutes-unit">
        <div class="top">0</div>
        <div class="bottom">0</div>
      </div>
    </div>

    <div class="colon">:</div>

    <!-- Seconds Group -->
    <div class="flip-group">
      <div class="flip-card" id="seconds-tensor">
        <div class="top">0</div>
        <div class="bottom">0</div>
      </div>
      <div class="flip-card" id="seconds-unit">
        <div class="top">0</div>
        <div class="bottom">0</div>
      </div>
    </div>

    <!-- AM/PM Indicator Card (Hidden in 24h mode) -->
    <div class="ampm-card" id="ampm-indicator">AM</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
