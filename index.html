<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>

  <!-- Character Encoding -->
  <meta charset="UTF-8">

  <!-- Responsive Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Primary Meta -->
  <title>Live Flip Clock — Aesthetic Digital Clock</title>
  <meta name="description" content="A modern responsive live flip clock with smooth card-flip animations, multiple colour themes, and 12/24-hour format support.">
  <meta name="keywords" content="Flip Clock, Digital Clock, Live Clock, Clock UI, HTML, CSS, JavaScript">
  <meta name="author" content="Arisudan">
  <meta name="theme-color" content="#0b0b0c" id="theme-meta">

  <!-- Open Graph / Social -->
  <meta property="og:title" content="Live Flip Clock">
  <meta property="og:description" content="Responsive flip clock with beautiful animations and themes.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://arisudan.dev/flip-clock">
  <meta property="og:locale" content="en_US">
  <meta property="og:site_name" content="Arisudan">
  <meta property="og:image" content="https://arisudan.dev/flip-clock/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Favicon (inline SVG data URI) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🕒%3C/text%3E%3C/svg%3E">

  <!-- Font Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body class="theme-dark">

  <!-- Skip to main content -->
  <a href="#clock-announcer" class="skip-link">Skip to clock</a>

  <!-- ============================================================
       CONTROL PANEL
  ============================================================ -->

  <header class="controls-panel">

    <!-- 12/24 Hour Format Toggle -->

    <div class="toggle-container">

      <span class="toggle-label">
        12-Hour Format
      </span>

      <label class="switch">

        <input
          type="checkbox"
          id="format-toggle"
          role="switch"
          aria-label="Toggle 12-hour clock format"
        >

        <span class="switch__track"></span>

      </label>

    </div>

    <!-- Theme Colour Picker -->

    <div class="theme-picker" role="radiogroup" aria-label="Clock theme">

      <button
        type="button"
        class="theme-btn theme-btn--dark active"
        data-theme="theme-dark"
        role="radio"
        aria-checked="true"
        aria-label="Dark theme"
        title="Classic Dark"
      ></button>

      <button
        type="button"
        class="theme-btn theme-btn--light"
        data-theme="theme-light"
        role="radio"
        aria-checked="false"
        aria-label="Light theme"
        title="Minimal Light"
      ></button>

      <button
        type="button"
        class="theme-btn theme-btn--sage"
        data-theme="theme-sage"
        role="radio"
        aria-checked="false"
        aria-label="Sage theme"
        title="Aesthetic Sage"
      ></button>

      <button
        type="button"
        class="theme-btn theme-btn--sakura"
        data-theme="theme-sakura"
        role="radio"
        aria-checked="false"
        aria-label="Sakura theme"
        title="Sakura Pink"
      ></button>

    </div>

  </header>

  <!-- ============================================================
       CLOCK DISPLAY
  ============================================================ -->

  <main class="clock-wrapper">

    <h1 class="sr-only">Live Flip Clock</h1>

    <section class="clock-container" role="timer" aria-label="Current time">

      <!-- HOURS -->

      <div class="flip-group" aria-hidden="true">

        <div class="flip-card" id="hours-tens">

          <div class="flip-card__top-back"><span>0</span></div>
          <div class="flip-card__bottom-front"><span>0</span></div>
          <div class="flip-card__top-front"><span>0</span></div>
          <div class="flip-card__bottom-back"><span>0</span></div>

        </div>

        <div class="flip-card" id="hours-unit">

          <div class="flip-card__top-back"><span>0</span></div>
          <div class="flip-card__bottom-front"><span>0</span></div>
          <div class="flip-card__top-front"><span>0</span></div>
          <div class="flip-card__bottom-back"><span>0</span></div>

        </div>

      </div>

      <!-- COLON SEPARATOR -->

      <div class="colon" aria-hidden="true">:</div>

      <!-- MINUTES -->

      <div class="flip-group" aria-hidden="true">

        <div class="flip-card" id="minutes-tens">

          <div class="flip-card__top-back"><span>0</span></div>
          <div class="flip-card__bottom-front"><span>0</span></div>
          <div class="flip-card__top-front"><span>0</span></div>
          <div class="flip-card__bottom-back"><span>0</span></div>

        </div>

        <div class="flip-card" id="minutes-unit">

          <div class="flip-card__top-back"><span>0</span></div>
          <div class="flip-card__bottom-front"><span>0</span></div>
          <div class="flip-card__top-front"><span>0</span></div>
          <div class="flip-card__bottom-back"><span>0</span></div>

        </div>

      </div>

      <!-- COLON SEPARATOR -->

      <div class="colon" aria-hidden="true">:</div>

      <!-- SECONDS -->

      <div class="flip-group" aria-hidden="true">

        <div class="flip-card" id="seconds-tens">

          <div class="flip-card__top-back"><span>0</span></div>
          <div class="flip-card__bottom-front"><span>0</span></div>
          <div class="flip-card__top-front"><span>0</span></div>
          <div class="flip-card__bottom-back"><span>0</span></div>

        </div>

        <div class="flip-card" id="seconds-unit">

          <div class="flip-card__top-back"><span>0</span></div>
          <div class="flip-card__bottom-front"><span>0</span></div>
          <div class="flip-card__top-front"><span>0</span></div>
          <div class="flip-card__bottom-back"><span>0</span></div>

        </div>

      </div>

      <!-- AM / PM INDICATOR -->

      <div class="ampm-card" id="ampm-indicator" aria-hidden="true">
        AM
      </div>

    </section>

  </main>

  <!-- ============================================================
       SCREEN READER ANNOUNCER (visually hidden)
  ============================================================ -->

  <div
    class="sr-only"
    id="clock-announcer"
    aria-live="polite"
    aria-atomic="true"
  ></div>

  <!-- ============================================================
       JAVASCRIPT
  ============================================================ -->

  <script src="js/app.js"></script>

</body>
</html>
