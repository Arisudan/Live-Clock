<!DOCTYPE html>
<html lang="en">

<head>

    <!-- =========================
         Basic Meta
    ========================== -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        http-equiv="X-UA-Compatible"
        content="IE=edge">

    <!-- =========================
         SEO
    ========================== -->

    <title>Live Flip Clock | Modern Digital Flip Clock</title>

    <meta
        name="description"
        content="A responsive digital flip clock featuring smooth flip animations, multiple themes, and 12/24-hour support.">

    <meta
        name="keywords"
        content="Flip Clock, Digital Clock, Live Clock, HTML CSS JavaScript">

    <meta
        name="author"
        content="Arisudan">

    <meta
        name="theme-color"
        content="#121212">

    <!-- =========================
         Open Graph
    ========================== -->

    <meta property="og:type" content="website">

    <meta
        property="og:title"
        content="Live Flip Clock">

    <meta
        property="og:description"
        content="Beautiful responsive flip clock built using HTML, CSS and JavaScript.">

    <!-- =========================
         Favicon
    ========================== -->

    <link
        rel="icon"
        href="favicon.ico">

    <!-- =========================
         CSS
    ========================== -->

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body class="theme-dark">

    <!-- ==========================================
            PAGE CONTAINER
    =========================================== -->

    <main class="page">

        <!-- ======================================
                TOP TOOLBAR
        ======================================= -->

        <header class="toolbar">

            <!-- Left Controls -->

            <section class="toolbar-left">

                <div class="toggle-group">

                    <span class="toggle-title">
                        12-Hour Format
                    </span>

                    <label
                        class="switch"
                        aria-label="Toggle Time Format">

                        <input
                            id="format-toggle"
                            type="checkbox">

                        <span class="slider"></span>

                    </label>

                </div>

            </section>

            <!-- Right Controls -->

            <section class="toolbar-right">

                <div
                    class="theme-picker"
                    role="group"
                    aria-label="Theme Selection">

                    <button
                        type="button"
                        class="theme-btn btn-dark active"
                        data-theme="theme-dark"
                        aria-label="Dark Theme">
                    </button>

                    <button
                        type="button"
                        class="theme-btn btn-light"
                        data-theme="theme-light"
                        aria-label="Light Theme">
                    </button>

                    <button
                        type="button"
                        class="theme-btn btn-sage"
                        data-theme="theme-sage"
                        aria-label="Sage Theme">
                    </button>

                    <button
                        type="button"
                        class="theme-btn btn-sakura"
                        data-theme="theme-sakura"
                        aria-label="Pink Theme">
                    </button>

                </div>

            </section>

        </header>

        <!-- ======================================
                CLOCK AREA
        ======================================= -->

        <section
            class="clock-wrapper"
            role="timer"
            aria-live="polite">

            <div class="clock-container">

                <!-- HOURS -->

                <div class="digit-group">

                    <div class="flip-card" id="hours-tensor">

                        <div class="top">0</div>

                        <div class="bottom">0</div>

                    </div>

                    <div class="flip-card" id="hours-unit">

                        <div class="top">0</div>

                        <div class="bottom">0</div>

                    </div>

                </div>

                <div
                    class="separator"
                    aria-hidden="true">

                    :

                </div>

                <!-- MINUTES -->

                <div class="digit-group">

                    <div class="flip-card" id="minutes-tensor">

                        <div class="top">0</div>

                        <div class="bottom">0</div>

                    </div>

                    <div class="flip-card" id="minutes-unit">

                        <div class="top">0</div>

                        <div class="bottom">0</div>

                    </div>

                </div>

                <div
                    class="separator"
                    aria-hidden="true">

                    :

                </div>

                <!-- SECONDS -->

                <div class="digit-group">

                    <div class="flip-card" id="seconds-tensor">

                        <div class="top">0</div>

                        <div class="bottom">0</div>

                    </div>

                    <div class="flip-card" id="seconds-unit">

                        <div class="top">0</div>

                        <div class="bottom">0</div>

                    </div>

                </div>

                <!-- AM PM -->

                <aside
                    id="ampm-indicator"
                    class="ampm-card"
                    aria-live="polite">

                    AM

                </aside>

            </div>

        </section>

    </main>

    <!-- ==========================================
            JAVASCRIPT
    =========================================== -->

    <script
        src="script.js"
        defer>
    </script>

</body>

</html>
